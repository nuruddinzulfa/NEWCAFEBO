<!DOCTYPE html>
<html lang="id">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Login | Kopilogi</title>

    <link rel="stylesheet" href="assets/css/global/base.css">
    <link rel="stylesheet" href="assets/css/global/navbar.css">
    <link rel="stylesheet" href="assets/css/pages/login.css">

</head>

<body>

    <!-- ================= NAVBAR ================= -->

    <nav class="navbar">

        <div class="container">

            <div class="logo">

                ☕ Kopilogi

            </div>

            <div class="nav-links">

                <a href="index.html">Beranda</a>

                <a href="menu.html">Menu</a>

                <a href="register.html">Register</a>

            </div>

        </div>

    </nav>

    <!-- ================= LOGIN ================= -->

    <section class="login">

        <div class="container">

            <form id="loginForm" class="form">

                <h2>Login</h2>

                <div class="form-group">

                    <label>Email</label>

                    <input placeholder="Masukkan email" type="email" id="email" required>

                </div>

                <div class="form-group">

                    <label>Password</label>

                    <input placeholder="Masukkan password" type="password" id="password" required>

                </div>

                <button type="submit" class="btn btn-primary">

                    Login

                </button>

                <p>

                    Belum punya akun?

                    <a href="register.html">Register</a>

                </p>

            </form>

        </div>

    </section>

    <script src="assets/js/api.js"></script>
    <script src="assets/js/auth.js"></script>

</body>

</html>
