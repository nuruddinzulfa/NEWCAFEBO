<!DOCTYPE html>
<html lang="id">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Menu | Kopilogi</title>

    <link rel="stylesheet" href="assets/css/global/base.css">
    <link rel="stylesheet" href="assets/css/global/navbar.css">
    <link rel="stylesheet" href="assets/css/pages/menu.css">
    <link rel="stylesheet" href="assets/css/global/footer.css">
    <link rel="stylesheet" href="assets/css/global/responsive.css">

</head>

<body>

    <!-- ================= NAVBAR ================= -->

    <nav class="navbar">

        <div class="container">

            <div class="logo">

                ☕ Kopilogi

            </div>

            <div class="nav-links">

                <a href="index.html">Beranda</a>
                <a href="menu.html">Menu</a>
                <a href="reservasi.html">Reservasi</a>
                <a href="login.html" id="navLogin">Login</a>
                <a href="#" id="navLogout" style="display:none" onclick="logout()">Logout</a>

            </div>

        </div>

    </nav>

    <!-- ================= HEADER ================= -->

    <section class="menu-page">

        <div class="container">

            <div class="menu-header">

                <h1>Menu Kami</h1>

                <p>Pilihan kopi, makanan dan dessert terbaik.</p>

            </div>

            <!-- Search -->

            <input
                type="text"
                id="searchMenu"
                placeholder="Cari menu..."
                class="search-box">

            <!-- Categories -->

            <div
                id="categoryContainer"
                class="category-container">

            </div>

            <!-- Menu Grid -->

            <div
                id="menuList"
                class="menu-grid">

            </div>

        </div>

    </section>

    <!-- ================= FOOTER ================= -->

    <footer>

        <div class="container">

            <div class="footer-grid">

                <div>

                    <h3>☕ Kopilogi</h3>

                    <p>Kopi tersaji, momen tersimpan.</p>

                </div>

                <div>

                    <h3>Jam Operasional</h3>

                    <p>Senin - Minggu</p>

                    <p>08.00 - 22.00</p>

                </div>

                <div>

                    <h3>Kontak</h3>

                    <p>0812-3456-7890</p>

                    <p>halo@kopilogi.id</p>

                </div>

            </div>

            <div class="footer-bottom">

                <p>&copy; 2026 Kopilogi. All rights reserved.</p>

            </div>

        </div>

    </footer>

    <script src="assets/js/api.js"></script>
    <script src="assets/js/menu.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", function() {
            const token = localStorage.getItem("token");
            const userData = localStorage.getItem("user");
            const navLogin = document.getElementById("navLogin");
            const navLogout = document.getElementById("navLogout");

            if (token && userData) {
                navLogin.style.display = "none";
                navLogout.style.display = "inline";
                try {
                    const user = JSON.parse(userData);
                    navLogout.textContent = "Logout (" + user.fullName + ")";
                } catch(e) {
                    navLogout.textContent = "Logout";
                }
            }
        });

        function logout() {
            localStorage.removeItem("token");
            localStorage.removeItem("user");
            window.location.href = "login.html";
        }
    </script>

</body>

</html>
