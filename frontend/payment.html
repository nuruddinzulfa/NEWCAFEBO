<!DOCTYPE html>
<html lang="id">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Pembayaran | Kopilogi</title>

    <link rel="stylesheet" href="assets/css/global/base.css">
    <link rel="stylesheet" href="assets/css/global/navbar.css">
    <link rel="stylesheet" href="assets/css/pages/payment.css">
    <link rel="stylesheet" href="assets/css/global/responsive.css">

</head>

<body>

    <nav class="navbar">

        <div class="container">

            <div class="logo">

                ☕ Kopilogi

            </div>

            <div class="nav-links">

                <a href="index.html">Beranda</a>
                <a href="menu.html">Menu</a>
                <a href="login.html" id="navLogin">Login</a>
                <a href="#" id="navLogout" style="display:none" onclick="logout()">Logout</a>

            </div>

        </div>

    </nav>

    <section class="payment-page">

        <div class="container">

            <div class="payment-card">

                <h1>Pembayaran</h1>

                <div id="orderInfo" class="order-info-box">

                    <p>Memuat data pesanan...</p>

                </div>

                <form id="paymentForm">

                    <div class="form-group">

                        <label>Metode Pembayaran</label>

                        <select id="paymentMethod" required>

                            <option value="CASH">Cash</option>

                            <option value="QRIS">QRIS</option>

                            <option value="TRANSFER">Transfer Bank</option>

                        </select>

                    </div>

                    <!-- Pilih Bank (muncul kalau Transfer) -->

                    <div id="bankSection" class="form-group" style="display:none">

                        <label>Pilih Bank</label>

                        <select id="bankName">

                            <option value="BRI">BRI</option>

                            <option value="BCA">BCA</option>

                            <option value="BNI">BNI</option>

                            <option value="MANDIRI">MANDIRI</option>

                            <option value="BSI">BSI</option>

                            <option value="CIMB">CIMB Niaga</option>

                            <option value="DANAMON">Danamon</option>

                        </select>

                    </div>

                    <!-- QRIS (muncul kalau QRIS) -->

                    <div id="qrisSection" class="qris-section" style="display:none">

                        <div class="qris-box">

                            <div class="qris-header">

                                <span>Scan QRIS untuk Bayar</span>

                            </div>

                            <div class="qris-image">

                                <svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">

                                    <rect width="200" height="200" fill="white"/>

                                    <!-- QR pattern placeholder -->

                                    <rect x="20" y="20" width="40" height="40" rx="4" fill="#2C1810"/>

                                    <rect x="24" y="24" width="32" height="32" rx="2" fill="white"/>

                                    <rect x="30" y="30" width="20" height="20" rx="2" fill="#2C1810"/>

                                    <rect x="140" y="20" width="40" height="40" rx="4" fill="#2C1810"/>

                                    <rect x="144" y="24" width="32" height="32" rx="2" fill="white"/>

                                    <rect x="150" y="30" width="20" height="20" rx="2" fill="#2C1810"/>

                                    <rect x="20" y="140" width="40" height="40" rx="4" fill="#2C1810"/>

                                    <rect x="24" y="144" width="32" height="32" rx="2" fill="white"/>

                                    <rect x="30" y="150" width="20" height="20" rx="2" fill="#2C1810"/>

                                    <!-- Data modules -->

                                    <rect x="70" y="20" width="8" height="8" fill="#2C1810"/>

                                    <rect x="86" y="20" width="8" height="8" fill="#2C1810"/>

                                    <rect x="102" y="20" width="8" height="8" fill="#2C1810"/>

                                    <rect x="118" y="20" width="8" height="8" fill="#2C1810"/>

                                    <rect x="70" y="36" width="8" height="8" fill="#2C1810"/>

                                    <rect x="102" y="36" width="8" height="8" fill="#2C1810"/>

                                    <rect x="70" y="70" width="8" height="8" fill="#2C1810"/>

                                    <rect x="86" y="70" width="8" height="8" fill="#2C1810"/>

                                    <rect x="102" y="70" width="8" height="8" fill="#2C1810"/>

                                    <rect x="118" y="70" width="8" height="8" fill="#2C1810"/>

                                    <rect x="134" y="70" width="8" height="8" fill="#2C1810"/>

                                    <rect x="150" y="70" width="8" height="8" fill="#2C1810"/>

                                    <rect x="70" y="86" width="8" height="8" fill="#2C1810"/>

                                    <rect x="102" y="86" width="8" height="8" fill="#2C1810"/>

                                    <rect x="134" y="86" width="8" height="8" fill="#2C1810"/>

                                    <rect x="20" y="70" width="8" height="8" fill="#2C1810"/>

                                    <rect x="36" y="70" width="8" height="8" fill="#2C1810"/>

                                    <rect x="20" y="86" width="8" height="8" fill="#2C1810"/>

                                    <rect x="52" y="86" width="8" height="8" fill="#2C1810"/>

                                    <rect x="20" y="102" width="8" height="8" fill="#2C1810"/>

                                    <rect x="36" y="102" width="8" height="8" fill="#2C1810"/>

                                    <rect x="52" y="102" width="8" height="8" fill="#2C1810"/>

                                    <rect x="70" y="102" width="8" height="8" fill="#2C1810"/>

                                    <rect x="102" y="102" width="8" height="8" fill="#2C1810"/>

                                    <rect x="118" y="102" width="8" height="8" fill="#2C1810"/>

                                    <rect x="150" y="102" width="8" height="8" fill="#2C1810"/>

                                    <rect x="70" y="118" width="8" height="8" fill="#2C1810"/>

                                    <rect x="86" y="118" width="8" height="8" fill="#2C1810"/>

                                    <rect x="134" y="118" width="8" height="8" fill="#2C1810"/>

                                    <rect x="150" y="118" width="8" height="8" fill="#2C1810"/>

                                    <rect x="70" y="134" width="8" height="8" fill="#2C1810"/>

                                    <rect x="102" y="134" width="8" height="8" fill="#2C1810"/>

                                    <rect x="118" y="134" width="8" height="8" fill="#2C1810"/>

                                    <rect x="150" y="134" width="8" height="8" fill="#2C1810"/>

                                    <rect x="70" y="150" width="8" height="8" fill="#2C1810"/>

                                    <rect x="86" y="150" width="8" height="8" fill="#2C1810"/>

                                    <rect x="102" y="150" width="8" height="8" fill="#2C1810"/>

                                    <rect x="118" y="150" width="8" height="8" fill="#2C1810"/>

                                    <rect x="134" y="150" width="8" height="8" fill="#2C1810"/>

                                    <rect x="150" y="150" width="8" height="8" fill="#2C1810"/>

                                    <rect x="70" y="166" width="8" height="8" fill="#2C1810"/>

                                    <rect x="102" y="166" width="8" height="8" fill="#2C1810"/>

                                    <rect x="134" y="166" width="8" height="8" fill="#2C1810"/>

                                    <rect x="166" y="70" width="8" height="8" fill="#2C1810"/>

                                    <rect x="166" y="86" width="8" height="8" fill="#2C1810"/>

                                    <rect x="166" y="102" width="8" height="8" fill="#2C1810"/>

                                    <rect x="166" y="118" width="8" height="8" fill="#2C1810"/>

                                    <rect x="166" y="134" width="8" height="8" fill="#2C1810"/>

                                    <rect x="166" y="150" width="8" height="8" fill="#2C1810"/>

                                    <rect x="166" y="166" width="8" height="8" fill="#2C1810"/>

                                    <!-- Center logo area -->

                                    <rect x="82" y="82" width="36" height="36" rx="6" fill="#C9783E"/>

                                    <text x="100" y="106" text-anchor="middle" fill="white" font-size="16" font-weight="bold">K</text>

                                </svg>

                            </div>

                            <p class="qris-instruction">Buka aplikasi banking atau e-wallet lalu scan kode QR ini</p>

                        </div>

                    </div>

                    <div class="form-group">

                        <label>Jumlah Bayar</label>

                        <input
                            placeholder="Masukkan jumlah bayar"
                            type="number"
                            id="paidAmount"
                            min="0"
                            required>

                        <small id="minPayNote" class="min-pay-note"></small>

                    </div>

                    <button class="btn btn-primary" type="submit">Bayar</button>

                </form>

            </div>

        </div>

    </section>

    <script src="assets/js/api.js"></script>
    <script src="assets/js/payment.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", function() {
            const token = localStorage.getItem("token");
            const userData = localStorage.getItem("user");
            const navLogin = document.getElementById("navLogin");
            const navLogout = document.getElementById("navLogout");

            if (token && userData) {
                navLogin.style.display = "none";
                navLogout.style.display = "inline";
                try {
                    const user = JSON.parse(userData);
                    navLogout.textContent = "Logout (" + user.fullName + ")";
                } catch(e) {
                    navLogout.textContent = "Logout";
                }
            }
        });

        function logout() {
            localStorage.removeItem("token");
            localStorage.removeItem("user");
            window.location.href = "login.html";
        }
    </script>

</body>

</html>
