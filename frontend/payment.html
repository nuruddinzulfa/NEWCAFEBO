<!DOCTYPE html>
<html lang="id">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Pembayaran | Kopilogi</title>

    <link rel="stylesheet" href="assets/css/global/base.css">
    <link rel="stylesheet" href="assets/css/global/navbar.css">
    <link rel="stylesheet" href="assets/css/pages/payment.css">
    <link rel="stylesheet" href="assets/css/global/responsive.css">

</head>

<body>

    <nav class="navbar">

        <div class="container">

            <div class="logo">

                ☕ Kopilogi

            </div>

            <div class="nav-links">

                <a href="index.html">Beranda</a>
                <a href="menu.html">Menu</a>
                <a href="login.html" id="navLogin">Login</a>
                <a href="#" id="navLogout" style="display:none" onclick="logout()">Logout</a>

            </div>

        </div>

    </nav>

    <section class="payment-page">

        <div class="container">

            <div class="payment-card">

                <h1>Pembayaran</h1>

                <p>Silakan pilih metode pembayaran.</p>

                <form id="paymentForm">

                    <div class="form-group">

                        <label>Metode Pembayaran</label>

                        <select id="paymentMethod" required>

                            <option value="CASH">Cash</option>

                            <option value="QRIS">QRIS</option>

                            <option value="TRANSFER">Transfer</option>

                        </select>

                    </div>

                    <div class="form-group">

                        <label>Jumlah Bayar</label>

                        <input placeholder="Masukkan jumlah bayar" type="number" id="paidAmount" required>

                    </div>

                    <button class="btn btn-primary" type="submit">Bayar</button>

                </form>

            </div>

        </div>

    </section>

    <script src="assets/js/api.js"></script>
    <script src="assets/js/payment.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", function() {
            const token = localStorage.getItem("token");
            const userData = localStorage.getItem("user");
            const navLogin = document.getElementById("navLogin");
            const navLogout = document.getElementById("navLogout");

            if (token && userData) {
                navLogin.style.display = "none";
                navLogout.style.display = "inline";
                try {
                    const user = JSON.parse(userData);
                    navLogout.textContent = "Logout (" + user.fullName + ")";
                } catch(e) {
                    navLogout.textContent = "Logout";
                }
            }
        });

        function logout() {
            localStorage.removeItem("token");
            localStorage.removeItem("user");
            window.location.href = "login.html";
        }
    </script>

</body>

</html>
