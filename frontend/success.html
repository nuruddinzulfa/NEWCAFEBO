<!DOCTYPE html>
<html lang="id">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Berhasil | Kopilogi</title>

    <link rel="stylesheet" href="assets/css/global/base.css">
    <link rel="stylesheet" href="assets/css/global/navbar.css">
    <link rel="stylesheet" href="assets/css/pages/success.css">
    <link rel="stylesheet" href="assets/css/global/responsive.css">

</head>

<body>

    <nav class="navbar">

        <div class="container">

            <div class="logo">

                ☕ Kopilogi

            </div>

            <div class="nav-links">

                <a href="index.html">Beranda</a>
                <a href="menu.html">Menu</a>
                <a href="login.html" id="navLogin">Login</a>
                <a href="#" id="navLogout" style="display:none" onclick="logout()">Logout</a>

            </div>

        </div>

    </nav>

    <section class="success">

        <div class="container">

            <h1>🎉</h1>

            <h2>Pesanan Berhasil</h2>

            <p>

                Terima kasih telah melakukan pemesanan di Kopilogi.

                Pesanan kamu sedang diproses.

            </p>

            <div class="success-buttons">

                <a href="menu.html" class="btn btn-primary">

                    Pesan Lagi

                </a>

                <a href="index.html" class="btn btn-outline">

                    Kembali ke Beranda

                </a>

            </div>

        </div>

    </section>

    <script>
        document.addEventListener("DOMContentLoaded", function() {
            const token = localStorage.getItem("token");
            const userData = localStorage.getItem("user");
            const navLogin = document.getElementById("navLogin");
            const navLogout = document.getElementById("navLogout");

            if (token && userData) {
                navLogin.style.display = "none";
                navLogout.style.display = "inline";
                try {
                    const user = JSON.parse(userData);
                    navLogout.textContent = "Logout (" + user.fullName + ")";
                } catch(e) {
                    navLogout.textContent = "Logout";
                }
            }
        });

        function logout() {
            localStorage.removeItem("token");
            localStorage.removeItem("user");
            window.location.href = "login.html";
        }
    </script>

</body>

</html>
