<!DOCTYPE html>
<html lang="id">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Order | Kopilogi</title>

    <link rel="stylesheet" href="assets/css/global/base.css">
    <link rel="stylesheet" href="assets/css/global/navbar.css">
    <link rel="stylesheet" href="assets/css/pages/order.css">
    <link rel="stylesheet" href="assets/css/global/footer.css">
    <link rel="stylesheet" href="assets/css/global/responsive.css">

</head>

<body>

    <nav class="navbar">

        <div class="container">

            <div class="logo">

                ☕ Kopilogi

            </div>

            <div class="nav-links">

                <a href="index.html">Beranda</a>
                <a href="menu.html">Menu</a>
                <a href="reservasi.html">Reservasi</a>
                <a href="login.html" id="navLogin">Login</a>
                <a href="#" id="navLogout" style="display:none" onclick="logout()">Logout</a>

            </div>

        </div>

    </nav>

    <!-- ================= CHECKOUT MODAL ================= -->

    <div id="checkoutModal" class="modal-overlay" style="display:none">

        <div class="modal-box">

            <div class="modal-header">

                <h2>Informasi Pemesan</h2>

                <button class="modal-close" onclick="closeModal()">&times;</button>

            </div>

            <form id="checkoutForm">

                <div class="form-group">

                    <label>Nama Lengkap</label>

                    <input
                        placeholder="Masukkan nama lengkap"
                        type="text"
                        id="customerName"
                        required>

                </div>

                <div class="form-group">

                    <label>Nomor HP</label>

                    <input
                        placeholder="Masukkan nomor HP"
                        type="tel"
                        id="customerPhone"
                        required>

                </div>

                <button type="submit" class="btn btn-primary modal-btn">

                    Lanjutkan ke Pembayaran

                </button>

            </form>

        </div>

    </div>

    <section class="order-page">

        <div class="container">

            <div class="order-grid">

                <!-- MENU -->

                <div>

                    <h2>Daftar Menu</h2>

                    <div id="menuContainer"></div>

                </div>

                <!-- CART -->

                <div class="cart">

                    <h2>Keranjang</h2>

                    <div id="cartContainer">

                        <p>Belum ada menu.</p>

                    </div>

                    <div class="form-group" id="tableSelectGroup">

                        <label>Pilih Meja</label>

                        <select id="tableId">

                            <option value="">-- Pilih Meja --</option>

                        </select>

                    </div>

                    <div class="cart-total">

                        <h3>Total</h3>

                        <h2 id="grandTotal">Rp0</h2>

                    </div>

                    <button id="checkoutBtn" class="btn btn-primary">

                        Checkout

                    </button>

                </div>

            </div>

        </div>

    </section>

    <script src="assets/js/api.js"></script>
    <script src="assets/js/order.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", function() {
            const token = localStorage.getItem("token");
            const userData = localStorage.getItem("user");
            const navLogin = document.getElementById("navLogin");
            const navLogout = document.getElementById("navLogout");

            if (token && userData) {
                navLogin.style.display = "none";
                navLogout.style.display = "inline";
                try {
                    const user = JSON.parse(userData);
                    navLogout.textContent = "Logout (" + user.fullName + ")";
                } catch(e) {
                    navLogout.textContent = "Logout";
                }
            }
        });

        function logout() {
            localStorage.removeItem("token");
            localStorage.removeItem("user");
            window.location.href = "login.html";
        }
    </script>

</body>

</html>
