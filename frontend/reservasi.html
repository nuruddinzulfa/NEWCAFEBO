<!DOCTYPE html>
<html lang="id">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Reservasi | Kopilogi</title>

    <link rel="stylesheet" href="assets/css/global/base.css">
    <link rel="stylesheet" href="assets/css/global/navbar.css">
    <link rel="stylesheet" href="assets/css/pages/reservasi.css">
    <link rel="stylesheet" href="assets/css/global/responsive.css">

</head>

<body>

    <nav class="navbar">

        <div class="container">

            <div class="logo">

                ☕ Kopilogi

            </div>

            <div class="nav-links">

                <a href="index.html">Beranda</a>
                <a href="menu.html">Menu</a>
                <a href="reservasi.html">Reservasi</a>
                <a href="login.html" id="navLogin">Login</a>
                <a href="#" id="navLogout" style="display:none" onclick="logout()">Logout</a>

            </div>

        </div>

    </nav>

    <section class="reservation">

        <div class="container">

            <h1>Reservasi Meja</h1>

            <form id="reservationForm" class="form">

                <div class="form-group">

                    <label>Nama Lengkap</label>

                    <input placeholder="Masukkan nama lengkap" type="text" id="customerName" required>

                </div>

                <div class="form-group">

                    <label>Nomor HP</label>

                    <input placeholder="Masukkan nomor HP" type="text" id="customerPhone" required>

                </div>

                <div class="form-group">

                    <label>Email</label>

                    <input placeholder="Masukkan email" type="email" id="customerEmail">

                </div>

                <div class="form-group">

                    <label>Tanggal</label>

                    <input placeholder="Pilih tanggal" type="date" id="reservationDate" min="" required>

                </div>

                <div class="form-group">

                    <label>Jam</label>

                    <input placeholder="Pilih jam" type="time" id="reservationTime" min="07:00" max="22:00" required>

                </div>

                <div class="form-group">

                    <label>Jumlah Orang</label>

                    <input placeholder="Masukkan jumlah orang" type="number" id="numberOfGuests" min="1" required>

                </div>

                <div class="form-group">

                    <label>Pilih Meja</label>

                    <select id="tableId" required>

                        <option>Memuat...</option>

                    </select>

                </div>

                <button type="submit" class="btn btn-primary">Reservasi</button>

            </form>

        </div>

    </section>

    <script src="assets/js/api.js"></script>
    <script src="assets/js/reservasi.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", function() {
            const token = localStorage.getItem("token");
            const userData = localStorage.getItem("user");
            const navLogin = document.getElementById("navLogin");
            const navLogout = document.getElementById("navLogout");

            if (token && userData) {
                navLogin.style.display = "none";
                navLogout.style.display = "inline";
                try {
                    const user = JSON.parse(userData);
                    navLogout.textContent = "Logout (" + user.fullName + ")";
                } catch(e) {
                    navLogout.textContent = "Logout";
                }
            }
        });

        function logout() {
            localStorage.removeItem("token");
            localStorage.removeItem("user");
            window.location.href = "login.html";
        }
    </script>

</body>

</html>
